<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Edges -->
  <g stroke="white" stroke-width="1.6" opacity="0.45">
    <line x1="14" y1="20" x2="32" y2="14"/>
    <line x1="14" y1="32" x2="32" y2="14"/>
    <line x1="14" y1="44" x2="32" y2="14"/>
    <line x1="14" y1="20" x2="32" y2="50"/>
    <line x1="14" y1="32" x2="32" y2="50"/>
    <line x1="14" y1="44" x2="32" y2="50"/>
    <line x1="32" y1="14" x2="50" y2="32"/>
    <line x1="32" y1="50" x2="50" y2="32"/>
  </g>

  <!-- Input nodes -->
  <circle cx="14" cy="20" r="5" fill="url(#node)"/>
  <circle cx="14" cy="32" r="5" fill="url(#node)"/>
  <circle cx="14" cy="44" r="5" fill="url(#node)"/>

  <!-- Hidden nodes -->
  <circle cx="32" cy="14" r="5.5" fill="white" opacity="0.9"/>
  <circle cx="32" cy="50" r="5.5" fill="white" opacity="0.9"/>

  <!-- Output node -->
  <circle cx="50" cy="32" r="7" fill="#FCD34D"/>
  <!-- L label on output -->
  <text x="50" y="36" text-anchor="middle" font-size="8" font-family="monospace" font-weight="bold" fill="#1C1917">L</text>
</svg>
