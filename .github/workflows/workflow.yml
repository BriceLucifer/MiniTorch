name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install project
        run: uv sync --locked --dev

      - name: Run tests
        run: uv run pytest tests/ -q

  quality:
    name: Static checks and package build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --locked --dev

      - name: Type-check Python
        run: uv run mypy MiniTorch

      - name: Build source and wheel
        run: uv build

      - name: Inspect distributions
        run: uv run --with twine twine check dist/*

  viewer:
    name: Model viewer
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lib/graph-viewer

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lib/graph-viewer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Verify production build
        run: npm run build

      - name: Ensure generated assets are committed
        working-directory: .
        run: git diff --exit-code -- MiniTorch/visualization/static
